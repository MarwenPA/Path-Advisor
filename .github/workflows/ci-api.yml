name: ci-api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"

jobs:
  lint-test-openapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python + dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        continue-on-error: true # advisory until type coverage matures; surface failures in summary
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest -q

      - name: Assert user-cascade contract (Story 1.12)
        # Refuses any FK to User with on_delete other than CASCADE / SET_NULL —
        # would break the right-to-erasure cascade pipeline.
        run: uv run python scripts/assert_user_cascade.py

      - name: Assert RBAC declaration contract (Story 1.7 §AC5)
        # Walks every URL pattern and refuses any endpoint without an EXPLICIT
        # `permission_classes` declaration. Endpoints intentionally public OR
        # IsAuthenticated-only must be whitelisted with rationale comments in
        # the script itself. Also enforces that IsOwner is composed with a
        # role permission (code-review D3) to prevent permission misuse.
        env:
          DJANGO_SETTINGS_MODULE: path_advisor.settings.test
        run: uv run python scripts/assert_rbac_declared.py

      - name: Export OpenAPI schema
        run: uv run python scripts/export_openapi.py

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: packages/openapi/openapi.json

  # Story 1.8 — RLS lane: provisions a NOSUPERUSER NOBYPASSRLS role so
  # `FORCE ROW LEVEL SECURITY` actually enforces (a superuser would silently
  # bypass it). Runs the `postgresql_only` + `rls` suite.
  rls-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_bootstrap
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: path_advisor_test
      POSTGRES_USER: path_advisor_test
      POSTGRES_PASSWORD: ci_test_role
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python + dependencies
        run: uv sync

      - name: Provision non-superuser DB role + database
        env:
          PGPASSWORD: postgres_bootstrap
        run: |
          # Connect as the bootstrap superuser to create the constrained
          # role + test DB. `FORCE ROW LEVEL SECURITY` only takes effect
          # when the table owner is NEITHER superuser NOR has BYPASSRLS.
          #
          # Idempotent: wrap CREATE ROLE in a DO block (PG doesn't support
          # CREATE ROLE IF NOT EXISTS) and use the explicit IF NOT EXISTS
          # variant for CREATE DATABASE. Safe to re-run on self-hosted
          # runners with persistent service containers.
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'path_advisor_test') THEN
                  CREATE ROLE path_advisor_test
                      LOGIN NOSUPERUSER NOBYPASSRLS
                      PASSWORD 'ci_test_role';
              END IF;
          END
          $$;
          SELECT 'CREATE DATABASE path_advisor_test OWNER path_advisor_test'
          WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'path_advisor_test')\gexec
          GRANT CREATE, USAGE ON SCHEMA public TO path_advisor_test;
          SQL

      - name: Pytest (RLS + postgresql_only)
        run: |
          uv run pytest \
            -m "rls or postgresql_only" \
            --ds=path_advisor.settings.test_postgres
