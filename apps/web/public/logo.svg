<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Path Advisor logo: trois chemins divergents partant d'un point d'ancrage.
       Maps aux 3 paris : audacieux (gauche), réaliste (centre), sûr (droite). -->

  <!-- Path: pari audacieux (gauche) -->
  <path d="M 40 64 C 34 52, 18 40, 12 18"
        stroke="#A85428" stroke-width="3.5" stroke-linecap="round" fill="none" />
  <circle cx="12" cy="18" r="3.5" fill="#A85428" />

  <!-- Path: pari réaliste (centre) -->
  <path d="M 40 64 C 40 50, 40 28, 40 14"
        stroke="#2F6B4F" stroke-width="3.5" stroke-linecap="round" fill="none" />
  <circle cx="40" cy="14" r="3.5" fill="#2F6B4F" />

  <!-- Path: pari sûr (droite) -->
  <path d="M 40 64 C 46 52, 62 40, 68 18"
        stroke="#3A7CA5" stroke-width="3.5" stroke-linecap="round" fill="none" />
  <circle cx="68" cy="18" r="3.5" fill="#3A7CA5" />

  <!-- Point d'ancrage : l'élève -->
  <circle cx="40" cy="64" r="5" fill="#C8312D" />
</svg>
