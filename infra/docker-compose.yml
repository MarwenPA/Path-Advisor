# Path-Advisor — local Docker Compose stack.
# Story 1.1 NFR-M1: `docker compose up` brings the full default stack online in < 5 min.
# Healthchecks added on every service so `depends_on: condition: service_healthy` is honoured.
# Analytics (PostHog) deferred to a dedicated story; bringing the official PostHog compose
# (ClickHouse + Kafka + plugin-server) here was out of scope.

name: path-advisor

networks:
  default:
    name: path_advisor_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ---------- App services ----------
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    container_name: pa-web
    ports:
      - "3000:3000"
    environment:
      # Browser-visible URL (used by Client Components).
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Server-side URL (used by Server Components inside the container).
      API_URL_SERVER: http://api:8000
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    container_name: pa-api
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AWS_S3_ENDPOINT_URL: http://minio:9000
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
    volumes:
      - ../apps/api:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/').read()\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ai-service:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile.dev
    container_name: pa-ai
    ports:
      - "8001:8001"
    env_file: ../.env
    volumes:
      - ../apps/ai-service:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------- Infrastructure ----------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pa-postgres
    environment:
      POSTGRES_DB: path_advisor
      POSTGRES_USER: path_advisor
      POSTGRES_PASSWORD: path_advisor_local_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U path_advisor -d path_advisor"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: pa-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: pa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_local
      MINIO_ROOT_PASSWORD: minio_local_password
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
